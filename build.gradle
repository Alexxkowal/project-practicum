plugins {
    id 'java'
    id 'checkstyle'
}

group = 'ru.tbank.practicum'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {

}

test {
    useJUnitPlatform()
}

// ----- Checkstyle -----

checkstyle {
    toolVersion = '12.3.1'
    configFile = rootProject.file('config/checkstyle/checkstyle.xml')
    configProperties = [
            'basedir': rootDir.path
    ]
    ignoreFailures = false
    showViolations = true
}
