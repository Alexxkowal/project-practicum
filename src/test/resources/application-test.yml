server:
  port: 0

spring:
  datasource:
    url: jdbc:tc:postgresql:15:///smart_home?TC_INITSCRIPT=file:src/test/resources/init.sql
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    topic:
      weather: weather-test-topic
      actuator-commands: commands-test-topic
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "ru.tbank.practicum.*"

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  cred:
    token: "test-token"
  weather:
    # Используем порт, который предоставит WireMock
    base-url: http://localhost:${wiremock.server.port:8089}
    update-rate: 1000000
  automation:
    blinds:
      closed-position: 0
      opened-position: 100
      sunny-position: 20
      high-temp-threshold: 25.0
      low-temp-threshold: 5.0
      atmosphere-position: 100
      rain-snow-warm-position: 100
      rain-snow-cold-position: 50
    heaters:
      default-target-temp: 25.0
      cold-threshold: 10.0
      stop-threshold: 18.0

logging:
  level:
    root: INFO
    ru.tbank.practicum: DEBUG
    org.springframework.web.reactive.function.client.WebClient: DEBUG
