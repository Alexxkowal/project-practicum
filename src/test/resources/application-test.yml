spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  kafka:
    topic:
      weather: weather-test-topic
      actuator-commands: commands-test-topic
    consumer:
      group-id: test-group

app:
  cred:
    token: "test-token"
  weather:
    base-url: http://localhost:${wiremock.server.port:8089}
    update-rate: 1000000
    default-lat: 51.6
    default-lon: 46.0

  automation:
    blinds:
      closed-position: 0
      opened-position: 100
      sunny-position: 20
      high-temp-threshold: 25.0
      low-temp-threshold: 5.0
      # Если эти поля есть в коде BlindsAutomationConfig, оставляем:
      atmosphere-position: 100
      rain-snow-warm-position: 100
      rain-snow-cold-position: 50
    heaters:
      default-target-temp: 25.0
      cold-threshold: 10.0
      stop-threshold: 18.0

logging:
  level:
    org.springframework.web.reactive.function.client.WebClient: DEBUG
    reactor.netty.http.client.HttpClient: DEBUG
    org.testcontainers: DEBUG