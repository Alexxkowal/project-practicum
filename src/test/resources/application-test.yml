spring:
  datasource:
    # Оставляем пустые заглушки, Testcontainers их перекроет через @ServiceConnection
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
app:
  cred:
    token: "test-token"
  weather:
    update-rate: 1000000 # Чтобы планировщик не мешал тестам
    default-lat: 51.6
    default-lon: 46.0