databaseChangeLog:
  - changeSet:
      id: 22032026-create-devices
      author: Alexkowal
      changes:
        - createTable:
            tableName: devices
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(50)
                  remarks: "HEATER/BLINDS"
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  remarks: "ONLINE / ERROR / OFF"
                  constraints:
                    nullable: false

              - column:
                  name: auto_mode
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: is_enabled
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false