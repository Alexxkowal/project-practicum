databaseChangeLog:
  - changeSet:
      id: 22032026-create-schedules-v2
      author: Alexkowal
      changes:
        - createTable:
            tableName: schedules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: device_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_schedules_devices
                    referencedTableName: devices
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: execution_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(50)
                  remarks: "Тип действия: TURN_ON, TURN_OFF, SET_VALUE"
                  constraints:
                    nullable: false
              - column:
                  name: target_value
                  type: DOUBLE PRECISION
                  remarks: "Значение (может быть NULL для простых команд ON/OFF)"
                  constraints:
                    nullable: true
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false