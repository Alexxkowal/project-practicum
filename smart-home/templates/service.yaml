apiVersion: v1
kind: Service
metadata:
  name: {{ include "smart-home.fullname" . }}
  labels:
    {{- include "smart-home.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smart-home.selectorLabels" . | nindent 4 }}